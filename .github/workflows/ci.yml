name: Uniplus API CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    # Inclui branches feat/** para validar PRs empilhados (PR alvo != main)
    branches:
      - main
      - 'feat/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_VERSION: 10.0.x
  BUILD_CONFIG: Release
  SOLUTION_PATH: UniPlus.slnx
  COVERAGE_DIR: coverage
  # Força actions JavaScript a rodar em Node.js 24 (Node 20 deprecado,
  # removido em set/2026). Recomendação oficial do aviso de deprecação.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # Threshold de cobertura (Domain + Application).
  # Escada gradual definida na issue #21: o piso aumenta a cada sprint
  # até atingir 80% quando a suíte de testes estiver madura.
  # Atualizar este valor à medida que a cobertura real evolui — nunca abaixar.
  COVERAGE_THRESHOLD: 0

jobs:
  adr-lint:
    name: ADR lint (MADR 4.0)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validar ADRs (MADR 4.0)
        run: bash tools/adr-lint/validate.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Markdown lint (markdownlint-cli2)
        # Versão pinada em sincronia com tools/adr-lint/validate.sh:
        # bump exige edição coordenada dos dois para preservar paridade
        # dev↔CI (script local invoca o mesmo binary).
        run: npx --yes markdownlint-cli2@0.22.1 'docs/adrs/**/*.md'

  spectral:
    name: Spectral lint (OpenAPI baselines)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint OpenAPI baselines
        # Pin de versão evita regressões surpresa: novas regras `recommended`
        # ou mudanças de severity em releases minor podem bloquear PRs sem
        # mudança de código. Atualizar manualmente após validação local.
        run: |
          npx --yes @stoplight/spectral-cli@6.15.0 lint \
            --ruleset tools/spectral/.spectral.yaml \
            --fail-severity=error \
            contracts/openapi.selecao.json contracts/openapi.ingresso.json

  forbidden-deps:
    name: Forbidden dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verificar pacotes proibidos
        run: bash tools/forbidden-deps/check.sh

  # ─────────────────────────────────────────────────────────────────────────
  # Pipeline build → (test-unit ∥ test-integration) → coverage-summary
  #
  # Refatoração da issue #88: o job monolítico anterior ("Build, Test and
  # Coverage") gerava status check único e pagava setup de Testcontainers
  # mesmo quando só os unit tests rodavam. A nova divisão entrega:
  #
  # - Status checks separados por etapa — falhas mais informativas e
  #   políticas de branch protection mais granulares
  # - test-unit e test-integration paralelos — wall-time reduzido
  # - bin/+obj/ compartilhados via artifact — sem rebuild redundante
  # ─────────────────────────────────────────────────────────────────────────

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }} --locked-mode

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration ${{ env.BUILD_CONFIG }} --no-restore

      # Empacotar em tar antes do upload preserva a estrutura por projeto
      # (<projeto>/bin/Release/...) — actions/upload-artifact "rebaseia" globs
      # iniciados com ** e flatteniza arquivos sob bin/ / obj/ comuns no
      # download, quebrando dotnet test --no-build --no-restore.
      # Solução com tar foi adotada em vez de actions/cache porque cache
      # depende de chave estável e, em PRs com push novo, pode atingir cache
      # de runs anteriores em vez do build atual; tar via artifact garante
      # que o exato output do build deste run chega aos test jobs.
      - name: Pack build output
        run: |
          find src tests -type d \( -path '*/bin/${{ env.BUILD_CONFIG }}' -o -name 'obj' \) > build-paths.txt
          tar -cf build-output.tar -T build-paths.txt
          ls -lh build-output.tar

      - name: Upload build output
        uses: actions/upload-artifact@v5
        with:
          name: build-output
          path: build-output.tar
          if-no-files-found: error
          retention-days: 1

  test-unit:
    name: Unit + arch tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies (lockfile mode)
        # NuGet packages cache acelera; --locked-mode garante reprodutibilidade
        # idêntica ao build job (mesmas versões resolvidas).
        run: dotnet restore ${{ env.SOLUTION_PATH }} --locked-mode

      - name: Download build output
        uses: actions/download-artifact@v5
        with:
          name: build-output

      - name: Unpack build output
        run: tar -xf build-output.tar

      - name: Run unit + arch tests with coverage
        # Filtra fora qualquer FullyQualifiedName contendo "IntegrationTests"
        # — assemblies *.IntegrationTests.dll são carregados mas dotnet test
        # não executa nenhum método, terminando rapidamente sem custo de Docker.
        run: |
          dotnet test ${{ env.SOLUTION_PATH }} \
            --configuration ${{ env.BUILD_CONFIG }} \
            --no-build \
            --no-restore \
            --filter "FullyQualifiedName!~IntegrationTests" \
            --logger "trx" \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --results-directory ${{ env.COVERAGE_DIR }}

      - name: Upload unit coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-unit
          path: ${{ env.COVERAGE_DIR }}/**/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 1

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results-unit
          path: ${{ env.COVERAGE_DIR }}/**/*.trx
          if-no-files-found: warn
          retention-days: 30

  test-integration:
    name: Integration tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies (lockfile mode)
        run: dotnet restore ${{ env.SOLUTION_PATH }} --locked-mode

      - name: Download build output
        uses: actions/download-artifact@v5
        with:
          name: build-output

      - name: Unpack build output
        run: tar -xf build-output.tar

      - name: Run integration tests with coverage
        run: |
          dotnet test ${{ env.SOLUTION_PATH }} \
            --configuration ${{ env.BUILD_CONFIG }} \
            --no-build \
            --no-restore \
            --filter "FullyQualifiedName~IntegrationTests" \
            --logger "trx" \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --results-directory ${{ env.COVERAGE_DIR }}

      # Sentinela do filtro AC (issue #205): a suite cascading da Selecao
      # marca cada teste com [Trait("Category", "OutboxCapability")] +
      # [Trait("Category", "OutboxCascading")]. Rodar explicitamente cada
      # filtro garante que (a) ambos os traits permanecem na fonte, e
      # (b) a suite tem pelo menos a quantidade mínima esperada de testes
      # — protege contra remoção acidental de uma das marcações.
      # Equivalente local:
      #   dotnet test tests/Unifesspa.UniPlus.Selecao.IntegrationTests \
      #     --filter "Category=OutboxCapability" --no-build
      - name: Sanity check — Category=OutboxCapability filter has expected coverage
        run: |
          set -euo pipefail
          MIN_TESTS=15
          out=$(dotnet test tests/Unifesspa.UniPlus.Selecao.IntegrationTests \
            --configuration ${{ env.BUILD_CONFIG }} \
            --no-build \
            --no-restore \
            --filter "Category=OutboxCapability" \
            --logger "console;verbosity=minimal")
          echo "$out"
          passed=$(echo "$out" | grep -oP 'Aprovado:\s*\K[0-9]+' | head -1 || true)
          if [ -z "${passed:-}" ]; then
            passed=$(echo "$out" | grep -oP 'Passed:\s*\K[0-9]+' | head -1 || echo 0)
          fi
          if [ "${passed:-0}" -lt "$MIN_TESTS" ]; then
            echo "::error::Filtro Category=OutboxCapability cobriu $passed testes, mínimo esperado $MIN_TESTS — alguma marcação foi perdida?"
            exit 1
          fi

      - name: Sanity check — Category=OutboxCascading filter has expected coverage
        run: |
          set -euo pipefail
          MIN_TESTS=8
          out=$(dotnet test tests/Unifesspa.UniPlus.Selecao.IntegrationTests \
            --configuration ${{ env.BUILD_CONFIG }} \
            --no-build \
            --no-restore \
            --filter "Category=OutboxCascading" \
            --logger "console;verbosity=minimal")
          echo "$out"
          passed=$(echo "$out" | grep -oP 'Aprovado:\s*\K[0-9]+' | head -1 || true)
          if [ -z "${passed:-}" ]; then
            passed=$(echo "$out" | grep -oP 'Passed:\s*\K[0-9]+' | head -1 || echo 0)
          fi
          if [ "${passed:-0}" -lt "$MIN_TESTS" ]; then
            echo "::error::Filtro Category=OutboxCascading cobriu $passed testes, mínimo esperado $MIN_TESTS — alguma marcação foi perdida?"
            exit 1
          fi

      - name: Upload integration coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-integration
          path: ${{ env.COVERAGE_DIR }}/**/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 1

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results-integration
          path: ${{ env.COVERAGE_DIR }}/**/*.trx
          if-no-files-found: warn
          retention-days: 30

  coverage-summary:
    name: Coverage summary
    needs: [test-unit, test-integration]
    # if: always() — quer rodar mesmo se test-* falhar para que o relatório
    # parcial fique disponível como evidência. Threshold step ainda enforca
    # falhas reais — esta fase não mascara nada, só agrega.
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore .NET tools (reportgenerator)
        run: dotnet tool restore

      - name: Download unit coverage
        uses: actions/download-artifact@v5
        with:
          name: coverage-unit
          path: ${{ env.COVERAGE_DIR }}/unit
        continue-on-error: true

      - name: Download integration coverage
        uses: actions/download-artifact@v5
        with:
          name: coverage-integration
          path: ${{ env.COVERAGE_DIR }}/integration
        continue-on-error: true

      - name: Merge coverage reports
        run: |
          dotnet reportgenerator \
            "-reports:${{ env.COVERAGE_DIR }}/**/coverage.cobertura.xml" \
            "-targetdir:${{ env.COVERAGE_DIR }}/report" \
            "-reporttypes:Cobertura;HtmlSummary;TextSummary;MarkdownSummaryGithub"

      - name: Publish coverage summary
        if: always()
        run: |
          if [ -f "${{ env.COVERAGE_DIR }}/report/SummaryGithub.md" ]; then
            cat "${{ env.COVERAGE_DIR }}/report/SummaryGithub.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Enforce coverage threshold (Domain + Application >= ${{ env.COVERAGE_THRESHOLD }}%)
        run: |
          report="${{ env.COVERAGE_DIR }}/report/Cobertura.xml"
          if [ ! -f "$report" ]; then
            echo "::error::Relatório de cobertura não encontrado em $report"
            exit 1
          fi

          line_rate=$(grep -oP 'line-rate="\K[0-9.]+' "$report" | head -1)
          if [ -z "$line_rate" ]; then
            echo "::error::Não foi possível extrair line-rate do relatório Cobertura"
            exit 1
          fi

          pct=$(awk "BEGIN{printf \"%.2f\", $line_rate * 100}")
          threshold=${{ env.COVERAGE_THRESHOLD }}
          echo "Cobertura agregada (Domain + Application): ${pct}% (mínimo: ${threshold}%)"

          if awk "BEGIN{exit !($line_rate * 100 < $threshold)}"; then
            echo "::error::Cobertura ${pct}% abaixo do mínimo exigido (${threshold}%)"
            exit 1
          fi

      - name: Upload merged coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: ${{ env.COVERAGE_DIR }}/report/**
          if-no-files-found: error
          retention-days: 30
