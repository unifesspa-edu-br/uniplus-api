replicaCount: 2

image:
  repository: registry.unifesspa.edu.br/uniplus/uniplus-api
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

env:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://+:8080

# Origens confiáveis para a política de CORS. Em ASPNETCORE_ENVIRONMENT
# diferente de Development, AddCorsConfiguration().ValidateOnStart() rejeita
# lista vazia — sem ao menos uma entrada o pod crashloopa no startup.
# Cada item vira a env var Cors__AllowedOrigins__<i> via ConfigMap.
cors:
  allowedOrigins: []

# Chaves esperadas no Secret externo `{{ .Release.Name }}-uniplus-secrets`
# (provisionado pelo RUNBOOK do uniplus-infra — NÃO renderizado por este chart).
# O monólito usa as 5 connection strings apontando para o MESMO banco `uniplus`
# (schema-por-módulo). Documentadas aqui para rastreabilidade:
secrets:
  uniPlusDbConnection: ""        # ConnectionStrings__UniPlusDb (outbox Wolverine + health)
  configuracaoDbConnection: ""   # ConnectionStrings__ConfiguracaoDb
  organizacaoDbConnection: ""    # ConnectionStrings__OrganizacaoDb
  selecaoDbConnection: ""        # ConnectionStrings__SelecaoDb
  ingressoDbConnection: ""       # ConnectionStrings__IngressoDb
  redisConnection: ""            # Redis__ConnectionString
  kafkaBootstrapServers: ""      # Kafka__BootstrapServers
  storageEndpoint: ""            # Storage__Endpoint
  storageAccessKey: ""           # Storage__AccessKey
  storageSecretKey: ""           # Storage__SecretKey
  authAuthority: ""              # Auth__Authority
  # Criptografia de PII (LGPD): AddUniPlusEncryption valida no startup
  # (ValidateOnStart) — SEM estas chaves o host crasha no boot antes de servir.
  # Provider "local" exige LocalKey; "vault" exige os campos Vault
  # (UniPlus__Encryption__VaultAddress / __VaultRole / __VaultTransitMount / ...).
  encryptionProvider: ""         # UniPlus__Encryption__Provider ("local" ou "vault")
  encryptionLocalKey: ""         # UniPlus__Encryption__LocalKey (obrigatória quando Provider=local)

healthcheck:
  # Liveness usa endpoint dependency-free (sem checks externos) para evitar
  # restart loops quando OIDC/DB/Kafka oscilam — apenas confirma que o
  # processo .NET continua respondendo. Readiness usa o /health agregado
  # com todos os checks (OIDC, Postgres, Kafka, Redis), removendo o pod
  # do Service quando dependência transitória cai sem reiniciá-lo.
  livenessPath: /health/live
  readinessPath: /health
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
