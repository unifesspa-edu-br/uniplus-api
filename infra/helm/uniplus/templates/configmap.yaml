apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-uniplus-config
  labels:
    app: {{ .Release.Name }}-uniplus-api
    app.kubernetes.io/name: uniplus-api
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  ASPNETCORE_ENVIRONMENT: {{ .Values.env.ASPNETCORE_ENVIRONMENT }}
  ASPNETCORE_URLS: {{ .Values.env.ASPNETCORE_URLS }}
  {{- range $index, $origin := .Values.cors.allowedOrigins }}
  Cors__AllowedOrigins__{{ $index }}: {{ $origin | quote }}
  {{- end }}
