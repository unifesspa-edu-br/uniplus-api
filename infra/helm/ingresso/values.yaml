replicaCount: 2

image:
  repository: registry.unifesspa.edu.br/uniplus/ingresso-api
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

env:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://+:8080

# Origens confiáveis para a política de CORS. Em ASPNETCORE_ENVIRONMENT
# diferente de Development, AddCorsConfiguration().ValidateOnStart() rejeita
# lista vazia — sem ao menos uma entrada o pod crashloopa no startup.
# Cada item vira a env var Cors__AllowedOrigins__<i> via ConfigMap.
cors:
  allowedOrigins: []

secrets:
  connectionString: ""
  redisConnection: ""
  kafkaBootstrapServers: ""
  storageEndpoint: ""
  storageAccessKey: ""
  storageSecretKey: ""
  authAuthority: ""

healthcheck:
  path: /health
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
