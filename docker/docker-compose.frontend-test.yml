# Override de DESENVOLVIMENTO para testar frontends do `uniplus-web` contra a API
# conteinerizada — SEM editar código do frontend.
#
# Com a topologia de 3 APIs, todos os módulos internos (Selecao/Ingresso/
# Configuracao/Organizacao) são servidos pela API UniPlus (monólito), no serviço
# `uniplus-api` do docker-compose.override.yml.
#
# Faz duas coisas:
#   1. Realinha o `Auth__Authority` da API UniPlus ao realm `unifesspa` — o realm
#      em que os frontends autenticam (clients `*-web`, que emitem aud=uniplus via
#      o client scope default `uniplus-profile`) — em vez do `unifesspa-dev-local`
#      do docker-compose.override.yml (usado por scripts de smoke/Newman). Sem
#      isso, endpoints autenticados rejeitam o token com 401 e o frontend entra
#      em loop de re-login; o GET de lista é `[AllowAnonymous]`, então retorna 200
#      e MASCARA o problema. Issuer canonicalizado por KC_HOSTNAME. A allowlist de
#      CORS das origins dos apps Angular vive no appsettings.Development.json da API.
#   2. Sobe um Traefik na :5000 que roteia /api/ ao `uniplus-api` (ADR-0064) e
#      reescreve /api/editais -> /api/selecao/editais (ver traefik/dynamic.yml) —
#      necessário ao frontend `selecao`, cujo runtime-config usa um único
#      `apiUrl=http://localhost:5000` (path pré-ADR-0064). Os apps que já usam
#      paths /api/{modulo}/ podem ir direto na :5200 da API UniPlus.
#
# Uso:
#   docker compose -f docker-compose.yml \
#                  -f docker-compose.override.yml \
#                  -f docker-compose.frontend-test.yml up -d
#
# Depois, em uniplus-web:
#   npx nx serve selecao       -> http://localhost:4200  (via gateway :5000)
#   npx nx serve configuracao  -> http://localhost:4203  (via gateway :5000 ou :5200 direto)
services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      - --entrypoints.web.address=:80
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --api.dashboard=true
      - --api.insecure=true
      - --log.level=INFO
    ports:
      - "5000:80"     # gateway consumido pelo frontend (apiUrl=http://localhost:5000)
      - "5080:8080"   # dashboard do Traefik -> http://localhost:5080/dashboard/
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    depends_on:
      uniplus-api:
        condition: service_healthy

  # A API UniPlus (monólito) e o Portal passam a validar o realm `unifesspa` (o que
  # os frontends usam), substituindo o `unifesspa-dev-local` do override. Os 4
  # módulos internos rodam no uniplus-api (realinha uma vez); o Portal é deployable
  # autônomo e precisa do realinhamento próprio para o frontend `portal` funcionar.
  uniplus-api:
    environment:
      Auth__Authority: "http://keycloak:8080/realms/unifesspa"

  portal-api:
    environment:
      Auth__Authority: "http://keycloak:8080/realms/unifesspa"
