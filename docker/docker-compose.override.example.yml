# Template do override de DESENVOLVIMENTO (copie para docker-compose.override.yml,
# que é gitignored). Sobe as APIs executáveis sobre a infra do docker-compose.yml.
#
# Topologia de 3 APIs:
#   * uniplus-api — MONÓLITO modular (Selecao + Ingresso + Configuracao +
#                   OrganizacaoInstitucional) no banco único `uniplus`.
#   * portal-api  — Portal (deploy autônomo, banco `uniplus_portal`).
#   * geo-api     — Geo (deploy autônomo, banco `uniplus_geo` com PostGIS). Ainda
#                   sem Dockerfile próprio; adicione `docker/Dockerfile.geo` e um
#                   serviço análogo a portal-api quando for conteinerizá-lo.
services:
  keycloak:
    # Override do compose canônico para importar ADICIONALMENTE o realm
    # `unifesspa-dev-local` — variante de conveniência para smoke local
    # (clients com directAccessGrantsEnabled, audience mapper para `uniplus`,
    # senha do admin não-temporária e requiredActions vazias).
    # O realm canônico `unifesspa` (de realm-export.json) continua importado
    # em paralelo, sem perda de funcionalidade.
    volumes:
      - ./keycloak/realm-export-dev-local.json:/opt/keycloak/data/import/realm-export-dev-local.json

  # API UniPlus — o MONÓLITO modular (composition root). Co-hospeda os 4 módulos
  # internos num único processo, contra o banco único `uniplus` (schema-por-módulo).
  uniplus-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.host
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      # As 5 connection strings apontam para o MESMO banco `uniplus`; cada
      # DbContext usa seu schema (HasDefaultSchema). UniPlusDb é o outbox
      # Wolverine (schema `wolverine`) + health checks agregados. Role única.
      ConnectionStrings__UniPlusDb: "Host=postgres;Port=5432;Database=uniplus;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__ConfiguracaoDb: "Host=postgres;Port=5432;Database=uniplus;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__OrganizacaoDb: "Host=postgres;Port=5432;Database=uniplus;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__SelecaoDb: "Host=postgres;Port=5432;Database=uniplus;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__IngressoDb: "Host=postgres;Port=5432;Database=uniplus;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Redis__ConnectionString: "redis:6379"
      Kafka__BootstrapServers: "kafka:29092"
      # Schema Registry (Apicurio em modo Confluent-compat) — sufixo /apis/ccompat/v7
      # é mandatório (Apicurio 3.x). Auth desligada em dev (AuthType=None default).
      SchemaRegistry__Url: "http://apicurio:8081/apis/ccompat/v7"
      Storage__Endpoint: "minio:9000"
      Storage__AccessKey: "${MINIO_ROOT_USER}"
      Storage__SecretKey: "${MINIO_ROOT_PASSWORD}"
      Auth__Authority: "http://keycloak:8080/realms/unifesspa-dev-local"
      Auth__Audience: "uniplus"
    ports:
      - "5200:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      apicurio:
        condition: service_healthy
      # Keycloak sobe junto da API (a API valida JWT contra o realm dev-local).
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  portal-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.portal
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PortalDb: "Host=postgres;Port=5432;Database=uniplus_portal;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Redis__ConnectionString: "redis:6379"
      Kafka__BootstrapServers: "kafka:29092"
      Storage__Endpoint: "minio:9000"
      Storage__AccessKey: "${MINIO_ROOT_USER}"
      Storage__SecretKey: "${MINIO_ROOT_PASSWORD}"
      Auth__Authority: "http://keycloak:8080/realms/unifesspa-dev-local"
    ports:
      - "5302:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      # Keycloak sobe junto da API (a API valida JWT contra o realm dev-local).
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
