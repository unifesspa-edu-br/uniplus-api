# Configuração dinâmica do Traefik (file provider) para o gateway de DEV do stack
# `docker-compose.override.yml` (serviço `traefik`, absorvido do antigo frontend-test).
#
# Topologia de 3 APIs: os 5 módulos internos (Selecao/Ingresso/Configuracao/
# Organizacao) são servidos pelo monólito `uniplus-api` sob /api/{modulo}/
# (ADR-0064); o `geo-api` (reference data sob /api/{cidades,estados,cep,
# logradouros}) e o `portal-api` (/api/portal/*) são deploys separados. Os
# frontends Angular consomem tudo por um único `apiUrl` (o gateway na :5000),
# então o gateway só precisa SEPARAR o tráfego das 3 APIs — sem reescrever paths.
#
# Os clients do `uniplus-web` já chamam os paths com prefixo de módulo (alinhados
# ao contrato — ADR-0064); por isso aqui NÃO há mais o shim legado
# `/api/editais -> /api/selecao/editais`. Em HML/PROD o equivalente (split geo vs
# monólito) vive no ingress do uniplus-infra (K8s).
http:
  routers:
    # Reference data do Geo (deploy separado) — encaminha sem reescrever.
    geo:
      rule: "PathPrefix(`/api/cidades`) || PathPrefix(`/api/estados`) || PathPrefix(`/api/cep`) || PathPrefix(`/api/logradouros`)"
      entryPoints:
        - web
      priority: 100
      service: geo

    # Portal (deploy separado) — /api/portal/* vai ao portal-api, não ao monólito.
    portal:
      rule: "PathPrefix(`/api/portal`)"
      entryPoints:
        - web
      priority: 100
      service: portal

    # Todo o resto de /api/ vai ao monólito: /api/{selecao,configuracao,
    # organizacao,ingresso}/... + /api/auth/* + /api/profile/*.
    monolito:
      rule: "PathPrefix(`/api/`)"
      entryPoints:
        - web
      priority: 1
      service: uniplus

  services:
    uniplus:
      loadBalancer:
        servers:
          - url: "http://uniplus-api:8080"
    geo:
      loadBalancer:
        servers:
          - url: "http://geo-api:8080"
    portal:
      loadBalancer:
        servers:
          - url: "http://portal-api:8080"
