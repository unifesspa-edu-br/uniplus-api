# Configuração dinâmica do Traefik (file provider) para o gateway de DEV usado
# pelo override `frontend-test` (ver docker-compose.frontend-test.yml).
#
# Topologia de 3 APIs: os 4 módulos internos (Selecao/Ingresso/Configuracao/
# Organizacao) são servidos pelo monólito `uniplus-api` sob /api/{modulo}/
# (ADR-0064); o `geo-api` é um deploy separado que serve reference data sob
# /api/{cidades,estados,cep,logradouros}. Os frontends Angular consomem ambos por
# um único `apiUrl` (o gateway na :5000), então o gateway só precisa SEPARAR o
# tráfego de geo do tráfego do monólito — sem reescrever paths.
#
# Os clients do `uniplus-web` já chamam os paths com prefixo de módulo (alinhados
# ao contrato — ADR-0064); por isso aqui NÃO há mais o shim legado
# `/api/editais -> /api/selecao/editais`. Em HML/PROD o equivalente (split geo vs
# monólito) vive no ingress do uniplus-infra (K8s).
http:
  routers:
    # Reference data do Geo (deploy separado) — encaminha sem reescrever.
    geo:
      rule: "PathPrefix(`/api/cidades`) || PathPrefix(`/api/estados`) || PathPrefix(`/api/cep`) || PathPrefix(`/api/logradouros`)"
      entryPoints:
        - web
      priority: 100
      service: geo

    # Todo o resto de /api/ vai ao monólito: /api/{selecao,configuracao,
    # organizacao,ingresso}/... + /api/auth/* + /api/profile/*.
    monolito:
      rule: "PathPrefix(`/api/`)"
      entryPoints:
        - web
      priority: 1
      service: uniplus

  services:
    uniplus:
      loadBalancer:
        servers:
          - url: "http://uniplus-api:8080"
    geo:
      loadBalancer:
        servers:
          - url: "http://geo-api:8080"
